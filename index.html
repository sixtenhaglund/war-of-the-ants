<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>War of The Ants</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== MENU ===== -->
<div id="menu">
  <h1>WAR OF THE ANTS</h1>
  <p class="choose">Choose your queen</p>
  <button onclick="startGame('basic')">🐜 BASIC &nbsp;— melee biter</button>
  <button onclick="startGame('spitter')">💚 SPITTER &nbsp;— spits acid (hold Space)</button>
  <button onclick="alert('Steer with the mouse, W/S to move. Hold left-click to mine walls and bite bugs.\n\nBASIC queen: fights up close by biting. SPITTER queen: hold SPACE to spray acid at enemies from a distance (she still mines and bites too).\n\nBeetles (2 bites) are harmless — left-click a dead one to carry it (2 on your back + 1 in your mouth).\n\nCentipedes HUNT you and bite — watch your health bar! A dead centipede is too heavy to carry: left-click it to DRAG it (half speed), worth more food.\n\nCarry prey to the ring in your nest and right-click to drop it — the bodies pile up as food and can be picked back up.\n\nHurt? Press E to EAT what is in your mouth. With empty jaws, stand on the pile and press E to CHOOSE what to eat. If you are slain, the queen is revived at the nest. Scroll to zoom.')">HOW TO PLAY</button>
</div>

<!-- ===== GAME ===== -->
<div id="game">
  <canvas id="cv"></canvas>
  <div id="hint">Mouse to steer &nbsp;·&nbsp; W / S move &nbsp;·&nbsp; Hold click to mine / bite &nbsp;·&nbsp; Space to spit acid (Spitter) &nbsp;·&nbsp; Left-click prey to carry / drag &nbsp;·&nbsp; Right-click to drop &nbsp;·&nbsp; E to eat</div>
  <div id="score">🍖 Food: 0</div>
</div>

<!-- ===== NEST PILE EAT-MENU (opens with E while standing on the pile) ===== -->
<div id="pilemenu">
  <div class="pilebox">
    <h2>🪺 NEST PILE</h2>
    <div id="pilelist"></div>
    <p class="pilehint">Click an item to eat it · press E or Esc to close</p>
  </div>
</div>

<!-- Game code, split into files. Order matters: config first (it defines the
     shared state everything else uses), then the systems, then game.js runs. -->
<script src="config.js"></script>
<script src="world.js"></script>
<script src="queen.js"></script>
<script src="beetles.js"></script>
<script src="centipedes.js"></script>
<script src="spitters.js"></script>
<script src="particles.js"></script>
<script src="render.js"></script>
<script src="input.js"></script>
<script src="game.js"></script>
</body>
</html>
