<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>War of The Ants</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== MENU ===== -->
<div id="menu">
  <h1>WAR OF THE ANTS</h1>
  <button onclick="startGame()">PLAY</button>
  <button onclick="alert('Steer with the mouse, W/S to move. Hold left-click to mine walls and bite bugs.\n\nBeetles (2 bites) are harmless — left-click a dead one to carry it (2 on your back + 1 in your mouth).\n\nCentipedes (5 bites) HUNT you and bite — watch your health bar! A dead centipede is too heavy to carry: left-click it to DRAG it (you move at half speed), worth 5 food.\n\nCarry prey to the ring in your nest and right-click to drop it — the bodies pile up there and still count as food (you can pick them back up any time).\n\nHurt? Press E to EAT what is in your mouth: a beetle heals 3 HP, a centipede 8-12. With empty jaws, stand on the pile and press E to open the pile and CHOOSE what to eat. If a centipede slays you, the queen is revived at the nest — the world carries on. Scroll to zoom.')">HOW TO PLAY</button>
</div>

<!-- ===== GAME ===== -->
<div id="game">
  <canvas id="cv"></canvas>
  <div id="hint">Mouse to steer &nbsp;·&nbsp; W / S move &nbsp;·&nbsp; Hold click to mine / bite &nbsp;·&nbsp; Left-click prey to carry / drag &nbsp;·&nbsp; Right-click to drop (drop in the ring to stock the pile) &nbsp;·&nbsp; E to eat</div>
  <div id="score">🍖 Food: 0/20</div>
</div>

<!-- ===== NEST PILE EAT-MENU (opens with E while standing on the pile) ===== -->
<div id="pilemenu">
  <div class="pilebox">
    <h2>🪺 NEST PILE</h2>
    <div id="pilelist"></div>
    <p class="pilehint">Click an item to eat it · press E or Esc to close</p>
  </div>
</div>

<!-- Game code, split into files. Order matters: config first (it defines the
     shared state everything else uses), then the systems, then game.js runs. -->
<script src="config.js"></script>
<script src="world.js"></script>
<script src="queen.js"></script>
<script src="beetles.js"></script>
<script src="centipedes.js"></script>
<script src="particles.js"></script>
<script src="render.js"></script>
<script src="input.js"></script>
<script src="game.js"></script>
</body>
</html>
